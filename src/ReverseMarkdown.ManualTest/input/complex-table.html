<!DOCTYPE html>
<html>
<head>
    <title>Complex Table Example</title>
</head>
<body>
    <h1>Product Comparison</h1>
    
    <table border="1">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Features</th>
                <th>Rating</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Product A</strong></td>
                <td>$99.99</td>
                <td>
                    <ul>
                        <li>Feature 1</li>
                        <li>Feature 2</li>
                    </ul>
                </td>
                <td>⭐⭐⭐⭐⭐</td>
            </tr>
            <tr>
                <td><strong>Product B</strong></td>
                <td>$149.99</td>
                <td>
                    <ul>
                        <li>Feature 1</li>
                        <li>Feature 2</li>
                        <li>Feature 3</li>
                    </ul>
                </td>
                <td>⭐⭐⭐⭐</td>
            </tr>
            <tr>
                <td><strong>Product C</strong></td>
                <td>$199.99</td>
                <td>All features included</td>
                <td>⭐⭐⭐⭐⭐</td>
            </tr>
        </tbody>
    </table>
    
    <h2>Notes</h2>
    <p>All prices include <em>tax</em> and <strong>shipping</strong>.</p>
</body>
</html>
